<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template Color</title>
    <style>
      body { margin: 0; padding: 12px; font-family: sans-serif; background: white; color: #111; }
      .picker { display: flex; flex-direction: column; gap: 10px; }
      label { font-size: 12px; color: #555; }
      #color { width: 100%; height: 40px; border: 1px solid #666; border-radius: 8px; padding: 0; background: white; }
      #preview { height: 32px; border: 1px solid #666; border-radius: 8px; }
      button { padding: 10px 12px; border: 1px solid #666; border-radius: 8px; background: white; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="picker">
      <label for="color">Template color</label>
      <input id="color" type="color" aria-label="Template color" />
      <div id="preview" aria-hidden="true"></div>
      <button id="use-player-color" type="button">Use Player Color</button>
    </div>

    <script type="module" src="/src/popovers/color-picker.js"></script>
  </body>
</html>
