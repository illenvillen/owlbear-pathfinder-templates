<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Clear My Templates</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        font-family: sans-serif;
        background: white;
        color: #111;
      }

      .wrap {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .message {
        font-size: 13px;
        line-height: 1.4;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      button {
        padding: 10px 12px;
        border: 1px solid #666;
        border-radius: 8px;
        background: white;
        cursor: pointer;
      }

      button.danger {
        background: #fee2e2;
        border-color: #dc2626;
        color: #991b1b;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="message">
        This will delete all of the templates you have placed. Are you sure?
      </div>
      <div class="actions">
        <button id="cancel" type="button">Cancel</button>
        <button id="confirm" type="button" class="danger">Delete</button>
      </div>
    </div>

    <script type="module" src="/src/popovers/confirm-clear-my-templates.js"></script>
  </body>
</html>
