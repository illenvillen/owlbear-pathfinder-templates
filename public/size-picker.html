<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creature Size</title>
    <style>
      body { margin: 0; padding: 12px; font-family: sans-serif; background: white; color: #111; }
      .picker { display: flex; flex-direction: column; gap: 8px; }
      button { width: 100%; padding: 10px 12px; border: 1px solid #666; border-radius: 8px; background: white; cursor: pointer; text-align: left; }
      button.selected { border: 2px solid black; background: #e6f0ff; font-weight: 700; }
      #note { margin-top: 8px; font-size: 12px; color: #555; }
    </style>
  </head>
  <body>
    <div class="picker" role="group" aria-label="Creature size">
      <button type="button" data-size="small-medium">Tiny / Small / Medium</button>
      <button type="button" data-size="large">Large</button>
      <button type="button" data-size="huge">Huge</button>
      <button type="button" data-size="gargantuan">Gargantuan</button>
    </div>
    <div id="note" aria-live="polite">Creature size affects emanation only.</div>

    <script type="module" src="/src/popovers/size-picker.js"></script>
  </body>
</html>
